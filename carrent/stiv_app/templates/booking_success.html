{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmed | CarRent</title>
    <link rel="stylesheet" href="{% static '/stiv_app/css/styles.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="booking-success-container">
        <div class="booking-success-card">
            <h1>🎉 Booking Confirmed!</h1>
            <p>Thank you, <strong>{{ booking.user.username }}</strong>!</p>
            <p>Your booking for <strong>{{ booking.car.name }}</strong> is confirmed.</p>
            <p>From: <strong>{{ booking.start_date }}</strong> &nbsp; To: <strong>{{ booking.end_date }}</strong></p>
            <p>Status: <span class="status">{{ booking.status }}</span></p>

            <div class="button-group">
                <a href="{% url 'payment' %}" class="btn btn-primary">Proceed to Payment</a>
                <a href="{% url 'product' %}" class="btn btn-secondary">View More Cars</a>
            </div>
        </div>
    </div>
</body>
</html>
